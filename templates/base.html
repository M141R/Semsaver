<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{{ title or "BITVault" }}</title>
        <meta name="description" content="BITVault is a curated repository of notes, syllabi, and papers for students.">
        {% block head_meta %}{% endblock %}
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;1,400&family=Manrope:wght@400;500;700;800&display=swap"
              rel="stylesheet">
        <script>
            (function () {
                var key = "bitvault-theme";
                var preferredDark =
                    window.matchMedia &&
                    window.matchMedia("(prefers-color-scheme: dark)").matches;
                var theme = localStorage.getItem(key) || (preferredDark ? "dark" : "light");
                document.documentElement.setAttribute("data-theme", theme);
                document.body && document.body.setAttribute("data-theme", theme);
            })();
        </script>
        <link rel="stylesheet"
              href="{{ url_for('static', filename='styles.css') }}">
        <script defer src="{{ url_for('static', filename='app.js') }}"></script>
        <script defer src="https://analytics.itsmihir.me/script.js" data-website-id="7c78f12c-a931-44ae-accb-5b2c5f322ead"></script>
    </head>
    <body>
        <a class="skip-link" href="#main-content">Skip to content</a>
        <div class="page-shell">
            <header class="topbar">
                <a class="brand" href="{{ url_for('hello') }}">BITVault</a>
                <nav class="main-nav" aria-label="Primary">
                    <a class="{% if active_page|default('repository') == 'repository' %}active{% endif %}"
                       href="{{ url_for('hello') }}">Repository</a>
                    <a class="{% if active_page == 'notes' %}active{% endif %}" href="{{ url_for('hello', type='Note') }}">Notes</a>
                    <a class="{% if active_page == 'syllabi' %}active{% endif %}" href="{{ url_for('hello', type='Syllabus') }}">Syllabi</a>
                    <a class="{% if active_page == 'papers' %}active{% endif %}" href="{{ url_for('hello', type='Paper') }}">Papers</a>
                </nav>
                <div class="top-actions">
                    <button class="icon-btn" aria-label="Notifications">&#128276;</button>
                    <button class="icon-btn" aria-label="Bookmarks">&#128278;</button>
                    <button class="icon-btn" id="theme-toggle" type="button" aria-label="Toggle dark mode">&#9788;</button>
                    {% if current_user.is_authenticated %}
                        <a class="sign-in" href="{{ url_for('admin') }}">Dashboard</a>
                        <form action="{{ url_for('admin_logout') }}" method="post" class="inline-form">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <button class="join-btn" type="submit">Logout</button>
                        </form>
                    {% else %}
                        <a class="sign-in" href="{{ url_for('auth_login') }}">Login</a>
                        <a class="join-btn" href="{{ url_for('public_upload') }}">Upload</a>
                    {% endif %}
                </div>
            </header>
            <main id="main-content">
                {% block content %}{% endblock %}
            </main>
            <footer class="page-footer">
                <p class="footer-brand">BITVault</p>
                <p class="copyright">&copy; 2026 BITVAULT. ALL RIGHTS RESERVED.</p>
            </footer>
        </div>
    </body>
</html>
