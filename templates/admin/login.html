<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{ title or "SemSaver Admin | Login" }}</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;1,400&family=Manrope:wght@400;500;700;800&display=swap"
		  rel="stylesheet">
	<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="admin-login-body">
	<header class="admin-login-topbar">
		<a class="admin-login-brand" href="{{ url_for('hello') }}">SemSaver</a>
		<nav class="admin-login-nav" aria-label="Top links">
			<a href="{{ url_for('hello') }}">Repository</a>
			<a href="#">Archives</a>
		</nav>
	</header>

	<main class="admin-login-main">
		<section class="admin-login-card" aria-label="Admin login">
			<h1>Admin Access</h1>
			<p class="admin-login-subtitle">PRIVATE MATERIAL CURATION PORTAL</p>

			{% if error %}
				<p class="form-error">{{ error }}</p>
			{% endif %}

			<form class="admin-login-form" action="{{ url_for('admin_login') }}" method="post">
				<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
				<label class="admin-login-field">
					<span class="admin-lock" aria-hidden="true">&#128274;</span>
					<input type="password" name="password" placeholder="Master Password" required>
				</label>
				<button type="submit" class="admin-primary-btn">Login</button>
			</form>

			<a class="admin-link-lite" href="{{ url_for('hello') }}">BACK TO PUBLIC LIBRARY</a>
		</section>

		<div class="admin-login-meta">
			<span class="meta-line"></span>
			<span>AUTHORIZED PERSONNEL ONLY</span>
		</div>
	</main>

	<footer class="admin-login-footer">
		<p>&copy; 2026 SEMSAVER. RESTRICTED ACCESS.</p>
		<p><a href="#">Privacy</a> <a href="#">Terms</a></p>
	</footer>
</body>
</html>
